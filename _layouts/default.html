<!doctype html>
<html lang="{{ site.lang | default: 'en-US' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#123f31">
    <meta name="description" content="{{ page.description | default: page.summary | default: site.description | strip_html | normalize_whitespace | escape }}">
    <title>{% if page.title %}{{ page.title | escape }} | {% endif %}{{ site.title | escape }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to content</a>

    <header class="site-header">
      <div class="site-header__inner">
        <a class="brand" href="{{ '/' | relative_url }}" aria-label="Dealer's Choice Poker Catalog home">
          <span class="brand__mark" aria-hidden="true">&spades;</span>
          <span>
            <strong>Dealer's Choice</strong>
            <small>Poker game catalog</small>
          </span>
        </a>
        <nav class="site-nav" aria-label="Primary navigation">
          <a href="{{ '/' | relative_url }}">Browse games</a>
          <a href="{{ '/house-rules/' | relative_url }}">House rules</a>
          <a href="{{ '/catalog/' | relative_url }}">Full catalog</a>
        </nav>
      </div>
    </header>

    <main id="main-content">
      {{ content }}
    </main>

    <footer class="site-footer">
      <div class="site-footer__inner">
        <p><strong>Dealer's Choice Poker Catalog</strong></p>
        <p>Confirm stakes, special cards, declarations, ties, and match caps before every deal. Follow applicable local law.</p>
      </div>
    </footer>

    {% if page.catalog_script %}
      <script src="{{ '/assets/js/catalog.js' | relative_url }}" defer></script>
    {% endif %}
  </body>
</html>
